default-target: all
# Use 'env: local' or 'env: hpc' to toggle between profiles
env: local

environments:
  local:
    python_bin: "/Users/mrzi/miniforge3/envs/snakemake/bin/python3"
    python_module: "" # Not needed locally
    evolver: "/Users/mrzi/Documents/software/paml4/paml/src/evolver"
    root_tree: "/Users/mrzi/Documents/develop/tkf_eval/tools/root_tree/target/debug/root_tree_and_internal_labels"
    simulate_tkf: "/Users/mrzi/Documents/develop/tkf_eval/tools/simulate_tkf/target/debug/simulate_tkf"
    iqtree3: "/Users/mrzi/Documents/software/iqtree3/iqtree3/build/iqtree3"
    model_search_phylo: "/Users/mrzi/Documents/develop/tkf_eval/tools/model_search_phylo/target/debug/model-search-phylo"
    jati: "/Users/mrzi/Documents/develop/tkf_eval/tools/JATI/target/debug/jati"
    indel_asr: "/Users/mrzi/Documents/develop/tkf_eval/tools/indel_asr/target/debug/indel_asr"
  hpc:
    python_bin: "python3"
    python_module: ""
    conda_env: "snakemake"
    evolver: "evolver"
    simulate_tkf: "/cfs/earth/scratch/mrzi/develop/simulate_tkf/target/release/simulate_tkf"
    iqtree3: "/cfs/earth/scratch/mrzi/software/iqtree3/iqtree3/build/iqtree3"
    model_search_phylo: "/cfs/earth/scratch/mrzi/develop/model_search_phylo/target/release/model-search-phylo"
    jati: "/cfs/earth/scratch/mrzi/develop/jati_tkf/JATI/target/release/jati"

# General
seeds: [1]

tree_sim:
  dir: "results/trees/{tree_sim_tool}/{tree_params}/seed{seed}.nwk"
  tools:
    evolver:
      species: []
      birth_death:
        - {birth: 1.0, death: 2.0}
      sampling_fraction: [0.25]
      mutation_rate: [1.0]
      path_snippet: "s{species}_b{birth}_d{death}_f{sampling_fraction}_m{mutation_rate}"
    iqtree:
      species: [16]
      blen:
        - {min: 0.0001, mean: 0.1, max: 1}
        # - {min: 0.0001, mean: 0.2, max: 1}
        # - {min: 0.0001, mean: 0.4, max: 1}
      path_snippet: "s{species}_blen{min}_{mean}_{max}"

msa_sim:
  dir: "results/msas/{tree_sim_tool}/{tree_params}/{msa_sim_tool}/{msa_params}/seed{seed}"
  tools:
    tkf:
      params:
        - {lambda: 0.03, mu: 0.033, r: 0.8}
        # - {lambda: 0.08, mu: 0.1, r: 0.5}
        # - {lambda: 0.1, mu: 0.2, r: 0.2}
      max_insertion: 50
      tkf_root_length: ["sampled", "expected"]
      model: ["jc69"]
      path_snippet: "l{lambda}_mu{mu}_r{r}_max{max_insertion}_len{tkf_root_length}_{model}"
    alisim:
      model: ["JC"]
      root_length: []
      ir_ip:
        - {ir: 0.006, ip: 0.018}
      path_snippet: "ir{ir}_ip{ip}_len{root_length}_{model}"

model_param_inf:
  dir: "results/model_inference/{tree_sim_tool}/{tree_params}/{msa_sim_tool}/{msa_params}/{inference_tool}/{inf_params}/seed{seed}"
  tools:
    jati_model_param_search:
      model_gap:
        # - {model: "jc69", gap: "Missing"}
        - {model: "NONE", gap: "TKF92"}
      epsilon: 1e-5
      max_iterations: 5
      path_snippet: "{model}_{gap}_{max_iterations}iter_epsilon{epsilon}"
    iqtree_model_param_search:
      # model: ["JC"]
      model: []
      path_snippet: "{model}"

asr: # with fixed true model parameters
  dir: "results/asr/{tree_sim_tool}/{tree_params}/{msa_sim_tool}/{msa_params}/{inference_tool}/{inf_params}/seed{seed}"
  tools:
    tkf_reestimate:
      max_iterations: 5
      epsilon: 1e-5
      path_snippet: "{max_iterations}iter_epsilon{epsilon}"
    dollo_parsimony:
      path_snippet: "no_params"

asr_and_params:
  dir: "results/asr_and_params/{tree_sim_tool}/{tree_params}/{msa_sim_tool}/{msa_params}/{inference_tool}/{inf_params}/seed{seed}"
  tools:
    jati_asr_and_params:
      start_params: 
        - {s_l: 0.1, s_m: 0.2, s_r: 0.5}
      max_iterations: 5
      epsilon: 1e-5
      path_snippet: "l{s_l}_mu{s_m}_r{s_r}_{max_iterations}iter_epsilon{epsilon}"

tree_inf:
  dir: "results/tree_inference/{tree_sim_tool}/{tree_params}/{msa_sim_tool}/{msa_params}/{inference_tool}/{inf_params}/seed{seed}"
  tools:
    jati:
      model_gap_move:
        - {model: "jc69", gap: "PIP", move: "NNI"}
        - {model: "jc69", gap: "Missing", move: "NNI"}
        - {model: "jc69", gap: "Missing", move: "SPR"}
        - {model: "jc69", gap: "PIP", move: "SPR"}
        - {model: "jc69", gap: "TKF92", move: "NNI"}
        - {model: "NONE", gap: "TKF92", move: "NNI"}
      max_iterations: 5
      epsilon: 1e-5
      path_snippet: "{model}_{gap}_{move}_{max_iterations}iter_epsilon{epsilon}"
    iqtree:
      model: ["JC"]
      path_snippet: "{model}"
