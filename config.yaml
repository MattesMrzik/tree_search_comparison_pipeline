# config.yaml (Environment-aware version)

# Use 'env: local' or 'env: hpc' to toggle between profiles
env: local

environments:
  local:
    python_bin: "/Users/mrzi/miniforge3/envs/snakemake/bin/python3"
    python_module: "" # Not needed locally
    evolver: "/Users/mrzi/Documents/software/paml4/paml/src/evolver"
    simulate_tkf: "/Users/mrzi/Documents/develop/simulate_tkf/target/debug/simulate_tkf"
    iqtree3: "/Users/mrzi/Documents/software/iqtree3/iqtree3/build/iqtree3"
    model_search_phylo: "/Users/mrzi/Documents/develop/model_search_phylo/target/release/model-search-phylo"
    jati: "/Users/mrzi/Documents/develop/jati_tkf/JATI/target/debug/jati"
  hpc:
    # Placeholders for cluster paths - update these on the HPC
    python_bin: "python3" # Will use 'module load python' or conda env
    python_module: "python/3.9.12-pe5.34"
    evolver: "/cfs/earth/scratch/USER/software/paml4/paml/src/evolver"
    simulate_tkf: "/cfs/earth/scratch/USER/develop/simulate_tkf/target/release/simulate_tkf"
    iqtree3: "/cfs/earth/scratch/USER/software/iqtree3/iqtree3/build/iqtree3"
    model_search_phylo: "/cfs/earth/scratch/USER/develop/model_search_phylo/target/release/model-search-phylo"
    jati: "/cfs/earth/scratch/USER/develop/jati_tkf/JATI/target/release/jati"

# NOTE on Regex Fields:
# 'tree_match', 'match_regex', and 'inf_match' are used by scripts/aggregate_results.py
# to extract metadata directly from directory names.

# General
seeds: [1]
# PAML Tree Generation Parameters

tree_path: "results/{seed}/trees/{tree_sim_tool}/{tree_params}.nwk"
tree_sim_tools:
  evolver:
    species: [8]
    birth&death:
      - [1.0, 2.0]
    sampling_fraction: [0.25]
    mutation_rate: [1.0]
    path_snippet: "s{species}_b{birth}_d{death}_f{sampling_fraction}_m{mutation_rate}"
    match_regex: 'evolver/s(?P<species>\d+)_b(?P<birth_rate>[\d.]+)_d(?P<death_rate>[\d.]+)_f(?P<sampling_fraction>[\d.]+)_m(?P<mutation_rate>[\d.]+)'

# MSA Simulation Tools & Their Parameters
msa_dir_path: "results/{seed}/msas/{tree_sim_tool}/{tree_params}/{msa_sim_tool}/{msa_params}"
msa_sim_tools:
  tkf:
    lambda: 0.03
    mu: 0.0303
    r: 0.8
    max_insertion: 50
    root_length: [500]
    model: ["JC"]
    path_snipped: "l{lambda}_mu{mu}_r{r}_max{max_insertion}_len{root_length}_{model}"
    match_regex: 'tkf/l(?P<tkf_lambda>[\d.]+)_mu(?P<tkf_mu>[\d.]+)_r(?P<tkf_r>[\d.]+)_max(?P<max_ins>\d+)_len(?P<root_length>\d+)_(?P<model>[^/]+)'
  alisim:
    model: ["JC"]
    root_length: [500]
    ir&ip: # (insertion_rate, deletion_rate)
        # For simulations with indels, we applied empirical parameters (Graur et al. 1989; Gu and Li 1995; Cartwright 2009) with the insertion and deletion rates of 0.03 and 0.09, respectively, and the indel-lengths drawn from a truncated Zipfian (Power-Law) distribution (Fletcher and Yang 2009) (a = 1.7; max = 100). alisim paper and these seem to be also the default params for alisim
      - [0.006, 0.018]
    path_snipped: "ir{ir}_ip{ip}_len{root_length}_{model}"
    match_regex: 'alisim/ir(?P<ir>[\d.]+)_ip(?P<ip>[\d.]+)_len(?P<root_length>\d+)_(?P<model>[^/]+)'

model_param_inf_dir: "results/{seed}/model_inference/{tree_sim_tool}{tree_params}/{msa_sim_tool}/{msa_params}/{inference_tool}/{inf_params}"
model_parameters_inference:
  jati_model_param_search:
    model&gap:
      - ["jc69", "PIP"]
      - ["jc69", "TKF92"]
      - ["jc69", "Missing"]
    epsilon: 1e-5
    params: [0.03, 0.04, 0.5]
    path_snippet: "{model}_{gap}"
    match_regex: 'jati_model_param_search/(?P<model>[^/]+)_(?P<gap>[^/]+)'

tree_inference_dir: "results/{seed}/tree_inference/{tree_sim_tool}{tree_params}/{msa_sim_tool}/{msa_params}/{inference_tool}/{inf_params}"
tree_inference_tools:
  jati:
    params: [0.03, 0.04, 0.5]
    model&gap&move:
      - ["jc69", "PIP", "NNI"]
      - ["jc69", "PIP", "SPR"]
      - ["jc69", "TKF92", "NNI"]
      - ["NONE", "TKF92", "NNI"]
    max_iterations: 5
    path_snippet: "{model}_{gap}_{move}"
    match_regex: 'jati/(?P<model>[^/]+)_(?P<gap>[^/]+)_(?P<move>[^/]+)'
  iqtree:
    models: ["JC"]
    path_snippet: "{model}"
    match_regex: 'iqtree/(?P<model>[^/]+)'

